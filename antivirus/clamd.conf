FollowDirectorySymlinks false
FollowFileSymlinks false
ReadTimeout 180
MaxThreads 12
MaxConnectionQueueLength 200
DatabaseDirectory /var/lib/clamav
OfficialDatabaseOnly false
SelfCheck 3600
Foreground false
Debug false
ScanPE true
MaxEmbeddedPE 500M
ScanOLE2 true
ScanPDF true
ScanHTML true
MaxHTMLNormalize 100M
MaxHTMLNoTags 100M
MaxScriptNormalize 100M
MaxZipTypeRcg 20M
ScanSWF true
ExitOnOOM false
LeaveTemporaryFiles false
HeuristicAlerts true
ScanELF true
IdleTimeout 30
CrossFilesystems true
PhishingSignatures true
PhishingScanURLs true
PartitionIntersection false
DetectPUA true
ScanPartialMessages false
HeuristicScanPrecedence false
StructuredDataDetection false
CommandReadTimeout 30
SendBufTimeout 200
MaxQueue 100
ExtendedDetectionInfo true
AlertOLE2Macros true
AllowAllMatchScan true
ForceToDisk false
DisableCertCheck false
MaxScanTime 120000000
MaxScanSize 500M
MaxFileSize 500M
MaxRecursion 20
MaxFiles 20000
MaxPartitions 100
MaxIconsPE 200
PCREMatchLimit 20000
PCRERecMatchLimit 4000
PCREMaxFileSize 50M
ScanXMLDOCS true
ScanHWP3 true
MaxRecHWP3 20
StreamMaxLength 50M
LogSyslog false
LogFacility LOG_LOCAL6
LogClean false
LogVerbose false
LogFile /var/log/clamav/clamav.log
LogTime true
LogFileUnlock false
LogFileMaxSize 0
